function initEmbeddedMessaging() {

function handleChatPopup() {

    let popup = document.getElementById("chatPopup");

    const observer = new MutationObserver(() => {
        const btn = document.querySelector('.embeddedMessagingConversationButton');

        if (btn && !popup.dataset.init) {

            popup.dataset.init = "true";

            // Show popup after 3 sec
            setTimeout(() => {
                popup.style.display = "block";
            }, 3000);

            // Hide when chat opens
            btn.addEventListener("click", () => {
                popup.style.display = "none";
            });

            // Detect open/close
            const chatObserver = new MutationObserver(() => {
                const chatIframe = document.querySelector("iframe");

                if (chatIframe) {
                    popup.style.display = "none";
                } else {
                    popup.style.display = "block";
                }
            });

            chatObserver.observe(document.body, {
                childList: true,
                subtree: true
            });
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

    // Click popup → open chat
    popup.onclick = function () {
        document.querySelector('.embeddedMessagingConversationButton')?.click();
    };
}
</script>
